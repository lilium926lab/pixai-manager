<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixAI プロンプト・モデル管理</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>PixAI プロンプト・モデル管理</h1>
        <nav>
            <ul id="nav">
                <li><a href="#prompts">プロンプト</a></li>
                <li><a href="#baseModels">ベースモデル</a></li>
                <li><a href="#loras">LoRA</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- Prompt Management Section -->
        <section id="prompts" class="section">
            <h2>プロンプト管理</h2>
            <form id="promptForm" class="entry-form">
                <div class="form-group">
                    <label for="promptName">名前:</label>
                    <input type="text" id="promptName" required>
                </div>
                <div class="form-group full-width">
                    <label for="promptText">プロンプトテキスト:</label>
                    <textarea id="promptText" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <button type="submit">追加</button>
                </div>
            </form>
            <div class="filter-group">
                <input type="text" id="promptSearch" placeholder="検索...">
            </div>
            <table class="list-table" id="promptTable">
                <thead>
                    <tr>
                        <th>名前</th>
                        <th>プロンプト</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>

        <!-- Base Model Management Section -->
        <section id="baseModels" class="section">
            <h2>ベースモデル管理</h2>
            <form id="baseModelForm" class="entry-form">
                <div class="form-group">
                    <label for="baseModelName">名前:</label>
                    <input type="text" id="baseModelName" required>
                </div>
                <div class="form-group">
                    <label for="baseModelType">タイプ:</label>
                    <input type="text" id="baseModelType" placeholder="例: DiT.2, SDXL 等" required>
                </div>
                <div class="form-group">
                    <label for="baseModelTags">タグ:</label>
                    <input type="text" id="baseModelTags" placeholder="カンマ区切り"> 
                </div>
                <div class="form-group">
                    <label><input type="checkbox" id="baseModelCommercial"> 商用利用可能</label>
                </div>
                <div class="form-group">
                    <button type="submit">追加</button>
                </div>
            </form>
            <div class="filter-group">
                <label><input type="checkbox" id="baseModelFilterCommercial"> 商用利用可能のみ表示</label>
                <input type="text" id="baseModelSearch" placeholder="検索...">
            </div>
            <table class="list-table" id="baseModelTable">
                <thead>
                    <tr>
                        <th>名前</th>
                        <th>タイプ</th>
                        <th>タグ</th>
                        <th>商用利用</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>

        <!-- LoRA Management Section -->
        <section id="loras" class="section">
            <h2>LoRA 管理</h2>
            <form id="loraForm" class="entry-form">
                <div class="form-group">
                    <label for="loraName">名前:</label>
                    <input type="text" id="loraName" required>
                </div>
                <div class="form-group">
                    <label for="loraBaseModel">ベースモデル:</label>
                    <input type="text" id="loraBaseModel" placeholder="例: DiT.2, SDXL 等" required>
                </div>
                <div class="form-group">
                    <label for="loraTags">タグ:</label>
                    <input type="text" id="loraTags" placeholder="カンマ区切り">
                </div>
                <div class="form-group">
                    <label><input type="checkbox" id="loraCommercial"> 商用利用可能</label>
                </div>
                <div class="form-group">
                    <button type="submit">追加</button>
                </div>
            </form>
            <div class="filter-group">
                <label><input type="checkbox" id="loraFilterCommercial"> 商用利用可能のみ表示</label>
                <input type="text" id="loraSearch" placeholder="検索...">
            </div>
            <table class="list-table" id="loraTable">
                <thead>
                    <tr>
                        <th>名前</th>
                        <th>ベースモデル</th>
                        <th>タグ</th>
                        <th>商用利用</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>
    </main>

    <footer>
        <p>PixAI プロンプト・モデル管理ツール — ローカルストレージに保存されます。GitHub Pages に配置してご利用ください。</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
